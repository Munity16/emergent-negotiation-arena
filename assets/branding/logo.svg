<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="Emergent Negotiation Arena logo: three agents converging on a shared symbol">
  <!-- Emergent Negotiation Arena — three agents, exchanged symbols, one shared word -->
  <defs>
    <style>
      .mono { font-family: Consolas, 'Courier New', ui-monospace, monospace; }
    </style>
  </defs>

  <!-- dark plate -->
  <rect x="2" y="2" width="236" height="236" rx="14" fill="#0a0a0a" stroke="#2b2b2b" stroke-width="1.5"/>

  <!-- corner brackets -->
  <g stroke="#6f6f6f" stroke-width="2" fill="none">
    <path d="M 20 30 L 20 20 L 30 20"/>
    <path d="M 210 20 L 220 20 L 220 30"/>
    <path d="M 220 210 L 220 220 L 210 220"/>
    <path d="M 30 220 L 20 220 L 20 210"/>
  </g>

  <!-- connecting edges -->
  <g stroke="#333333" stroke-width="1.5">
    <line x1="120" y1="58" x2="62"  y2="164"/>
    <line x1="120" y1="58" x2="178" y2="164"/>
    <line x1="62"  y1="164" x2="178" y2="164"/>
  </g>
  <!-- edges to the shared word -->
  <g stroke="#4a4a4a" stroke-width="1" stroke-dasharray="3 4">
    <line x1="120" y1="58"  x2="120" y2="128"/>
    <line x1="62"  y1="164" x2="120" y2="128"/>
    <line x1="178" y1="164" x2="120" y2="128"/>
  </g>

  <!-- exchanged symbols on the edges (drawn shapes, not glyphs) -->
  <!-- diamond -->
  <path d="M 84 104 l 7 9 l -7 9 l -7 -9 z" fill="#b3b3b3"/>
  <!-- triangle -->
  <path d="M 156 104 l 8 16 l -16 0 z" fill="#8a8a8a"/>
  <!-- circle -->
  <circle cx="120" cy="176" r="6.5" fill="#8a8a8a"/>

  <!-- agent nodes -->
  <g class="mono" font-size="15" font-weight="bold" text-anchor="middle">
    <circle cx="120" cy="58"  r="20" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
    <text x="120" y="63.5" fill="#f5f5f5">0</text>
    <circle cx="62"  cy="164" r="20" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
    <text x="62" y="169.5" fill="#f5f5f5">1</text>
    <circle cx="178" cy="164" r="20" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
    <text x="178" y="169.5" fill="#f5f5f5">2</text>
  </g>

  <!-- the emergent shared word: bracketed diamond, single red accent -->
  <g class="mono" font-size="17" fill="#6f6f6f" text-anchor="middle">
    <text x="98" y="134">[</text>
    <text x="142" y="134">]</text>
  </g>
  <path d="M 120 118 l 8.5 11 l -8.5 11 l -8.5 -11 z" fill="#f5f5f5"/>
  <circle cx="120" cy="129" r="17" fill="none" stroke="#ff5555" stroke-width="1.3" opacity="0.85"/>

  <!-- wordmark -->
  <text x="120" y="212" class="mono" font-size="11" letter-spacing="3" fill="#b3b3b3" text-anchor="middle">E·N·A</text>
</svg>
