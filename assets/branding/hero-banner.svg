<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Emergent Negotiation Arena — three AI agents, no shared language, they must invent one to survive">
  <defs>
    <style>
      .mono { font-family: Consolas, 'Courier New', ui-monospace, monospace; }
    </style>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#1b1b1b" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- plate -->
  <rect width="1200" height="320" fill="#0a0a0a"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" fill="none" stroke="#2b2b2b" stroke-width="1.5"/>

  <!-- deco bracket row -->
  <g class="mono" font-size="12" fill="#4a4a4a">
    <text x="48" y="52">[</text>
    <text x="70" y="52" letter-spacing="8">■ ■ ■&#160;&#160;&#160;■ ■&#160;&#160;&#160;■ ■ ■&#160;&#160;&#160;■</text>
    <text x="330" y="52">]</text>
  </g>

  <!-- title + live dot -->
  <text x="48" y="118" class="mono" font-size="44" font-weight="bold" fill="#f5f5f5" letter-spacing="2" textLength="666" lengthAdjust="spacingAndGlyphs">EMERGENT NEGOTIATION ARENA</text>
  <circle cx="740" cy="103" r="7" fill="#ff5555">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- subtitle -->
  <text x="48" y="156" class="mono" font-size="17" fill="#b3b3b3">Three AI agents. No shared language. They must invent one to survive.</text>

  <!-- progression strip -->
  <g class="mono" font-size="13">
    <rect x="48" y="196" width="700" height="76" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>

    <!-- stage 1: symbol -->
    <path d="M 92 226 l 8 10 l -8 10 l -8 -10 z" fill="#b3b3b3"/>
    <text x="122" y="241" fill="#b3b3b3">SYMBOL</text>

    <text x="218" y="240" fill="#6f6f6f" font-size="16">&#8594;</text>

    <!-- stage 2: repeated use -->
    <path d="M 258 228 l 6.5 8 l -6.5 8 l -6.5 -8 z" fill="#8a8a8a"/>
    <path d="M 280 228 l 6.5 8 l -6.5 8 l -6.5 -8 z" fill="#b3b3b3"/>
    <path d="M 302 228 l 6.5 8 l -6.5 8 l -6.5 -8 z" fill="#e0e0e0"/>
    <text x="326" y="241" fill="#b3b3b3">REPEATED USE</text>

    <text x="470" y="240" fill="#6f6f6f" font-size="16">&#8594;</text>

    <!-- stage 3: shared word -->
    <text x="506" y="243" fill="#6f6f6f" font-size="17">[</text>
    <path d="M 532 226 l 8 10 l -8 10 l -8 -10 z" fill="#f5f5f5"/>
    <text x="548" y="243" fill="#6f6f6f" font-size="17">]</text>
    <text x="568" y="241" fill="#f5f5f5">SHARED &#8220;WORD&#8221;</text>
    <line x1="506" y1="254" x2="700" y2="254" stroke="#ff5555" stroke-width="1.4" opacity="0.9"/>
  </g>

  <!-- right: agent system diagram -->
  <g transform="translate(820,20)">
    <!-- edges -->
    <g stroke="#333333" stroke-width="1.5">
      <line x1="170" y1="58" x2="70"  y2="212"/>
      <line x1="170" y1="58" x2="270" y2="212"/>
      <line x1="70"  y1="212" x2="270" y2="212"/>
    </g>
    <g stroke="#4a4a4a" stroke-width="1" stroke-dasharray="3 4">
      <line x1="170" y1="58"  x2="170" y2="160"/>
      <line x1="70"  y1="212" x2="170" y2="160"/>
      <line x1="270" y1="212" x2="170" y2="160"/>
    </g>

    <!-- exchanged symbols -->
    <path d="M 112 126 l 7 9 l -7 9 l -7 -9 z" fill="#b3b3b3"/>
    <path d="M 228 126 l 8 15 l -16 0 z" fill="#8a8a8a"/>
    <circle cx="170" cy="224" r="6" fill="#8a8a8a"/>
    <rect x="204" y="206" width="10" height="10" fill="#6f6f6f"/>

    <!-- agent nodes -->
    <g class="mono" font-size="14" font-weight="bold" text-anchor="middle">
      <circle cx="170" cy="58"  r="19" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
      <text x="170" y="63" fill="#f5f5f5">0</text>
      <circle cx="70"  cy="212" r="19" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
      <text x="70" y="217" fill="#f5f5f5">1</text>
      <circle cx="270" cy="212" r="19" fill="#0d0d0d" stroke="#8a8a8a" stroke-width="1.5"/>
      <text x="270" y="217" fill="#f5f5f5">2</text>
    </g>

    <!-- the shared word at the centre -->
    <g class="mono" font-size="15" fill="#6f6f6f" text-anchor="middle">
      <text x="150" y="166">[</text>
      <text x="190" y="166">]</text>
    </g>
    <path d="M 170 150 l 8 10 l -8 10 l -8 -10 z" fill="#f5f5f5"/>
    <circle cx="170" cy="160" r="16" fill="none" stroke="#ff5555" stroke-width="1.2" opacity="0.85"/>

    <!-- labels -->
    <g class="mono" font-size="10" fill="#6f6f6f" text-anchor="middle">
      <text x="170" y="24">agent_0</text>
      <text x="70"  y="250">agent_1</text>
      <text x="270" y="250">agent_2</text>
    </g>
  </g>

  <!-- footer coordinates -->
  <text x="48" y="300" class="mono" font-size="11" fill="#4a4a4a">[ 10×10 grid world · 4 resources · trade to survive · every proposal carries an invented symbol ]</text>
</svg>
